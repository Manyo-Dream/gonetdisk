services:
  gonetdiskdb:
    image: mysql:8.0
    container_name: gonetdiskdb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: gonetdisk
      MYSQL_DATABASE: gonetdisk
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command: 
      --character-set-server=utf8mb4 
      --collation-server=utf8mb4_unicode_ci